<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Website HTML and CSS</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts Links For Icon -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  </head>
  <body>
    <header>
      <nav class="navbar">
        <a class="logo" href="#"><span class="logo-title">House of Crunch.</span></a>
        <ul class="menu-links">
          <span id="close-menu-btn" class="material-symbols-outlined">close</span>
            <li class="nav"><a href="#">Home</a></li>
            <li class="nav"><a href="#">Products</a></li>
            <li class="nav"><a href="#">Testimonials</a></li>
            <li class="nav"><a href="#">About us</a></li>
            <li class="nav"><a href="#">Contact us</a></li>
        </ul>
        <span id="hamburger-btn" class="material-symbols-outlined">menu</span>
      </nav>
    </header>

    <section class="hero-section">
      <div class="content">
        <h2><span>Crispy!</span> on the Outside, <span>Juicy!</span>  on the Inside</h2>
        <p class="sub-text">
          Freshly fried chicken, golden fries, and snacks made to satisfy every craving
        </p>
        <button class="order-btn">Order Now</button>
        <button class="order-btn">View Products</button>
      </div>
      <div class="footer_copyright">
        <p>All rights reserved 2026</p>
      </div>
    </section>

    <script>
      const header = document.querySelector("header");
      const hamburgerBtn = document.querySelector("#hamburger-btn");
      const closeMenuBtn = document.querySelector("#close-menu-btn");

      // Toggle mobile menu on hamburger button click
      hamburgerBtn.addEventListener("click", () => header.classList.toggle("show-mobile-menu"));

      // Close mobile menu on close button click
      closeMenuBtn.addEventListener("click", () => hamburgerBtn.click());
    </script>
    
  </body>
</html>
